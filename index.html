<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для мамы</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #121212; /* Темный фон, чтобы не «кринжово» /
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        button {
            padding: 15px 30px;
            font-size: 18px;
            cursor: pointer;
            background-color: #00ff41; / Зеленый «хакерский» цвет /
            border: none;
            border-radius: 5px;
            color: black;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #00cc33;
            transform: scale(1.05);
        }
        #message {
            display: none; / Сначала скрыто */
            margin-top: 30px;
            font-size: 24px;
            line-height: 1.5;
            animation: fadeIn 1s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <button onclick="showMessage()">Запустить поздравление.exe</button>
    </div>

    <div id="message">
        <h1>С днем рождения!</h1>
        <p>Мам, ты самый лучший человек в моей жизни. <br> 
        Спасибо за всё, что ты делаешь. <br>
        Оставайся такой же крутой! 🚀</p>
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('message').style.display = 'block';
    }
</script>

</body>
</html>
