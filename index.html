<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для самой лучшей мамы</title>
    <style>
        /* Основной фон с градиентом */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: white;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 10;
            padding: 20px;
        }

        /* Стильная кнопка */
        .main-button {
            padding: 18px 45px;
            font-size: 20px;
            cursor: pointer;
            background: linear-gradient(45deg, #00dbde, #fc00ff);
            border: none;
            border-radius: 50px;
            color: white;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            text-transform: uppercase;
        }

        .main-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(0, 219, 222, 0.4);
        }

        /* Карточка с поздравлением (эффект стекла) */
        #message {
            display: none;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            max-width: 500px;
            animation: slideUp 0.8s ease-out;
        }

        h1 {
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 32px;
            margin-bottom: 20px;
        }

        p {
            font-size: 19px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Анимация появления */
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Украшение: плавающие круги на фоне */
        .circle {
            position: absolute;
            background: linear-gradient(45deg, rgba(0, 219, 222, 0.1), rgba(252, 0, 255, 0.1));
            border-radius: 50%;
            z-index: 1;
            filter: blur(30px);
        }
    </style>
</head>
<body>

    <div class="circle" style="width: 200px; height: 200px; bottom: -50px; right: -50px;"></div>
