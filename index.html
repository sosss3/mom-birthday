<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для мамы</title>
    <style>
        body {
            background-color: #0f172a; /* Темно-синий фон */
            color: white;
            font-family: sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            width: 90%;
            max-width: 400px;
        }
        .btn {
            background: linear-gradient(45deg, #00f2fe, #4facfe);
            border: none;
            padding: 20px 40px;
            color: white;
            font-size: 22px;
            font-weight: bold;
            border-radius: 15px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            cursor: pointer;
        }
        #message {
            display: none;
            padding: 20px;
            border: 2px solid #4facfe;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
        }
        h1 { font-size: 28px; color: #00f2fe; margin-top: 0; }
        p { font-size: 20px; line-height: 1.5; }
    </style>
</head>
<body>

    <div class="container" id="box">
        <button class="btn" id="btn" onclick="show()">НАЖМИ СЮДА</button>

        <div id="message">
            <h1>С Днём Рождения!</h1>
            <p>Мам, ты самая лучшая и крутая! ❤️</p>
            <p>Спасибо за всё. Очень тебя люблю!🚀</p>
        </div>
    </div>

    <script>
        function show() {
            document.getElementById('btn').style.display = 'none';
            document.getElementById('message').style.display = 'block';
        }
    </script>
</body>
</html>
