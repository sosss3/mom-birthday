<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для мамы</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #000000; /* Глубокий черный фон /
            font-family: sans-serif;
            color: #ffffff; / Чисто белый текст /
            text-align: center;
        }
        .container {
            padding: 20px;
            max-width: 400px;
        }
        button {
            padding: 20px 40px;
            font-size: 20px;
            cursor: pointer;
            background-color: #00ff41; / Яркий зеленый */
            border: none;
            border-radius: 12px;
            color: #000000;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.4);
            transition: 0.3s;
        }
        button:hover {
            transform: scale(1.1);
            background-color: #05ffbc;
        }
        #message {
            display: none;
            background: rgba(255, 255, 255, 0.1);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #333;
        }
        h1 { color: #00ff41; margin-bottom: 10px; }
        p { font-size: 20px; line-height: 1.6; color: #ffffff; }
    </style>
</head>
<body>

<div class="container">
    <div id="start-screen">
        <button onclick="showMessage()">ОТКРЫТЬ СООБЩЕНИЕ</button>
    </div>

    <div id="message">
        <h1>С днем рождения!</h1>
        <p>Мам, ты самая лучшая! <br> 
        Спасибо за твою поддержку и доброту. <br>
        Пусть каждый день будет крутым! 🚀</p>
    </div>
</div>

<script>
    function showMessage() {
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('message').style.display = 'block';
    }
</script>

</body>
</html>
