<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Для мамы</title>
    <style>
        /* Убираем все отступы и фиксируем фон */
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #0f172a;
            color: white;
            font-family: sans-serif;
        }

        /* Центрируем всё через старый добрый Flex */
        .wrapper {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
            text-align: center;
        }

        .btn {
            background: #00f2fe;
            color: #000;
            border: none;
            padding: 25px 50px;
            font-size: 24px;
            font-weight: bold;
            border-radius: 10px;
            display: block; /* Гарантируем видимость */
        }

        #message {
            display: none;
            padding: 20px;
            width: 80%;
        }

        h1 { font-size: 32px; color: #00f2fe; }
        p { font-size: 22px; line-height: 1.4; }
    </style>
</head>
<body>

    <div class="wrapper">
        <button class="btn" id="mainBtn" onclick="show()">НАЖМИ НА МЕНЯ</button>

        <div id="message">
            <h1>С Днём Рождения!</h1>
            <p>Аникай, ты самая лучшая! ❤️</p>
            <p>Очень тебя люблю! 🚀</p>
        </div>
    </div>

    <script>
        function show() {
            // Прямой метод скрытия/показа без лишних эффектов
            document.getElementById('mainBtn').style.display = 'none';
            document.getElementById('message').style.display = 'block';
        }
    </script>
</body>
</html>
